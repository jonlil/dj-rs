<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dj-rs</title>

    <link data-trunk rel="css" href="style.css" />
    <link data-trunk rel="rust" />

    <script>
        // WebRTC ICE trick to discover local IP without a STUN server call
        window.getLocalIp = function() {
            return new Promise((resolve) => {
                const pc = new RTCPeerConnection({ iceServers: [] });
                pc.createDataChannel('');
                pc.createOffer().then(o => pc.setLocalDescription(o));
                pc.onicecandidate = (e) => {
                    if (!e || !e.candidate) return;
                    const m = e.candidate.candidate.match(/([0-9]{1,3}(\.[0-9]{1,3}){3})/);
                    if (m && !m[1].startsWith('0.')) {
                        pc.close();
                        resolve(m[1]);
                    }
                };
                setTimeout(() => resolve(null), 3000);
            });
        };

        // WebSocket reconnect helper callable from WASM
        window.__ws = null;
        window.__ws_listeners = {};

        window.wsConnect = function(url) {
            if (window.__ws && window.__ws.readyState < 2) {
                window.__ws.close();
            }
            window.__ws = new WebSocket(url);
            window.__ws.onopen = function() {
                if (window.__ws_listeners['open']) window.__ws_listeners['open']();
            };
            window.__ws.onclose = function() {
                if (window.__ws_listeners['close']) window.__ws_listeners['close']();
            };
            window.__ws.onerror = function(e) {
                if (window.__ws_listeners['error']) window.__ws_listeners['error'](e.toString());
            };
            window.__ws.onmessage = function(e) {
                if (window.__ws_listeners['message']) window.__ws_listeners['message'](e.data);
            };
        };

        window.wsOnOpen = function(cb) { window.__ws_listeners['open'] = cb; };
        window.wsOnClose = function(cb) { window.__ws_listeners['close'] = cb; };
        window.wsOnMessage = function(cb) { window.__ws_listeners['message'] = cb; };
        window.wsOnError = function(cb) { window.__ws_listeners['error'] = cb; };
        window.wsSend = function(msg) {
            if (window.__ws && window.__ws.readyState === 1) {
                window.__ws.send(msg);
            }
        };
        window.wsState = function() {
            return window.__ws ? window.__ws.readyState : -1;
        };
    </script>
</head>
<body>
    <!-- Trunk injects WASM bootstrap here -->
</body>
</html>
